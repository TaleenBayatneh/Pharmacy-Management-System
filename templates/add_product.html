<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Product - Amjad Pharmacy</title>
    <link rel="stylesheet" href="/static/css/add.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-prescription-bottle-medical"></i>
                <span>Amjad Pharmacy</span>
            </div>
            <button class="close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="/dashboard" class="link">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li class="active">
                    <a href="/medicien" class="link">
                        <i class="fas fa-pills"></i>
                        <span>Medicine</span>
                    </a>
                </li>
                <li>
                    <a href="/users" class="link">
                        <i class="fas fa-users"></i>
                        <span>Users</span>
                    </a>
                </li>
                <li>
                    <a href="/customer" class="link">
                        <i class="fas fa-user-group"></i>
                        <span>Customers</span>
                    </a>
                </li>
                <li>
                    <a href="/orders" class="link">
                        <i class="fas fa-clipboard-list"></i>
                        <span>Orders</span>
                    </a>
                </li>
                <li>
                    <a href="/sales" class="link">
                        <i class="fas fa-cash-register"></i>
                        <span>Sales</span>
                    </a>
                </li>
                <li>
                    <a href="/reports" class="link">
                        <i class="fas fa-chart-pie"></i>
                        <span>Reports</span>
                    </a>
                </li>
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <div class="time-display">
                <i class="fas fa-clock"></i>
                <div>
                    <p id="current-time"></p>
                    <p id="current-date"></p>
                </div>
            </div>
            <a href="/" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header class="top-header">
            <button class="toggle-sidebar" id="toggleSidebar"><i class="fas fa-bars"></i></button>
            <div class="header-title">
                <h1><i class="fas fa-plus-circle"></i> Add New Product</h1>
                <p>Add a new medicine to inventory</p>
            </div>
        </header>

        <div class="form-container">
            <div class="form-card">
                <div class="card-header"><i class="fas fa-pills"></i><h2>Product Information</h2></div>
                
                <form action="{{ url_for('add_product') }}" method="POST">
                    <div class="form-row">
                        <div class="form-group">
                            <label for="name"><i class="fas fa-tag"></i> Product Name</label>
                            <input type="text" name="name" id="name" placeholder="Enter product name" required>
                        </div>
                        <div class="form-group">
                            <label for="ProductType"><i class="fas fa-th-large"></i> Product Type</label>
                            <input type="text" name="ProductType" id="ProductType" placeholder="e.g., Tablet, Syrup, Capsule">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="Price"><i class="fas fa-shekel-sign"></i> Price</label>
                            <input type="number" name="Price" id="Price" min="1" placeholder="Enter price">
                        </div>
                        <div class="form-group">
                            <label for="Quantity"><i class="fas fa-cubes"></i> Quantity</label>
                            <input type="number" name="Quantity" id="Quantity" min="0" placeholder="Enter quantity">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label for="ExpirationDate"><i class="fas fa-calendar-alt"></i> Expiration Date</label>
                            <input type="date" name="ExpirationDate" id="ExpirationDate">
                        </div>
                        <div class="form-group">
                            <label for="Description"><i class="fas fa-align-left"></i> Description</label>
                            <input type="text" name="Description" id="Description" placeholder="Enter description">
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="/medicien" class="btn btn-cancel"><i class="fas fa-times"></i> Cancel</a>
                        <button type="submit" class="btn btn-submit"><i class="fas fa-check"></i> Add Product</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById("current-time").textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            document.getElementById("current-date").textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        const toggleBtn = document.getElementById("toggleSidebar");
        const closeBtn = document.getElementById("closeSidebar");
        const sidebar = document.getElementById("sidebar");
        toggleBtn.addEventListener("click", () => sidebar.classList.toggle("active"));
        closeBtn.addEventListener("click", () => sidebar.classList.remove("active"));
    </script>
</body>
</html>
