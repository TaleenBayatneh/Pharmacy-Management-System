<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome Pharmacist</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f5f7f6;
            min-height: 100vh;
            display: flex;
        }

        .sidebar {
            width: 260px;
            background: linear-gradient(180deg, #f0f7f4 0%, #e8f3ed 100%);
            min-height: 100vh;
            position: fixed;
            left: 0;
            top: 0;
            display: flex;
            flex-direction: column;
            border-right: 1px solid #d5e5dc;
            z-index: 100;
        }

        .sidebar-header {
            padding: 20px;
            border-bottom: 1px solid #d4e5dc;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            color: #3d5a4c;
        }

        .logo i {
            font-size: 26px;
            color: #5a9e7a;
        }

        .logo span {
            font-size: 16px;
            font-weight: 600;
        }

        .close-sidebar {
            display: none;
            background: none;
            border: none;
            color: #5a7a6a;
            font-size: 18px;
            cursor: pointer;
            padding: 6px;
            border-radius: 6px;
            transition: background 0.3s;
        }

        .close-sidebar:hover {
            background: rgba(255, 255, 255, 0.7);
        }

        .sidebar-nav {
            flex: 1;
            padding: 16px 0;
            overflow-y: auto;
        }

        .sidebar-nav ul {
            list-style: none;
        }

        .sidebar-nav li {
            margin: 2px 10px;
        }

        .sidebar-nav li a {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 14px;
            color: #4a6358;
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.2s ease;
            font-size: 14px;
            font-weight: 500;
        }

        .sidebar-nav li a i {
            font-size: 16px;
            width: 22px;
            text-align: center;
        }

        .sidebar-nav li a:hover {
            background: rgba(255, 255, 255, 0.7);
            color: #3d5a4c;
        }

        .sidebar-nav li.active a {
            background: #ffffff;
            color: #3d5a4c;
            border-left: 3px solid #6aab8c;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.04);
        }

        .link {
            text-decoration: none;
        }

        .sidebar-footer {
            padding: 20px;
            border-top: 1px solid #d5e5dc;
        }

        .time-display {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 10px;
            margin-bottom: 12px;
        }

        .time-display i {
            font-size: 18px;
            color: #6aab8c;
        }

        .time-display p {
            color: #4a6358;
            font-size: 12px;
        }

        .time-display #current-time {
            font-size: 14px;
            font-weight: 600;
            color: #3d5a4c;
        }

        .logout-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            width: 100%;
            padding: 12px;
            background: #faf0f0;
            color: #c57070;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 500;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .logout-btn:hover {
            background: #f5e5e5;
            color: #b85c5c;
        }

        .main-content {
            flex: 1;
            margin-left: 260px;
            padding: 50px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .welcome-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            padding: 60px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .welcome-icon {
            width: 100px;
            height: 100px;
            background: linear-gradient(135deg, #e8f3ed 0%, #d5ebe0 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 25px;
        }

        .welcome-icon i {
            font-size: 48px;
            color: #5a9e7a;
        }

        .welcome-card h1 {
            font-size: 32px;
            color: #3d5a4c;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .welcome-card p {
            color: #8a9a92;
            font-size: 18px;
            line-height: 1.6;
        }

        @media (max-width: 768px) {
            .sidebar {
                width: 70px;
            }
            .sidebar-header span,
            .sidebar-nav li a span,
            .logout-btn span {
                display: none;
            }
            .sidebar-header {
                justify-content: center;
            }
            .sidebar-nav li a {
                justify-content: center;
                padding: 12px;
            }
            .main-content {
                margin-left: 70px;
            }
        }
    </style>
</head>
<body>
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-prescription-bottle-medical"></i>
                <span>Amjad Pharmacy</span>
            </div>
            <button class="close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        <nav class="sidebar-nav">
            <ul>
                <li class="active">
                    <a href="/dashboard2" class="link"><i class="fas fa-home"></i><span>Home</span></a>
                </li>
                <li>
                    <a href="/medicien2" class="link"><i class="fas fa-pills"></i><span>Medicine</span></a>
                </li>
                <li>
                    <a href="/users2" class="link"><i class="fas fa-user-md"></i><span>My Profile</span></a>
                </li>
                <li>
                    <a href="/customer2" class="link"><i class="fas fa-user-friends"></i><span>Customers</span></a>
                </li>
                <li>
                    <a href="/orders2" class="link"><i class="fas fa-truck"></i><span>Orders</span></a>
                </li>
                <li>
                    <a href="/sales2" class="link"><i class="fas fa-cash-register"></i><span>Sales</span></a>
                </li>
            </ul>
        </nav>
        <div class="sidebar-footer">
            <div class="time-display">
                <i class="fas fa-clock"></i>
                <div>
                    <p id="current-time"></p>
                    <p id="current-date"></p>
                </div>
            </div>
            <a href="/" class="logout-btn"><i class="fas fa-sign-out-alt"></i><span>Logout</span></a>
        </div>
    </div>

    <div class="main-content">
        <div class="welcome-card">
            <div class="welcome-icon">
                <i class="fas fa-user-md"></i>
            </div>
            <h1>Welcome, {{ name }}!</h1>
            <p>Have a great day!</p>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            const dateString = now.toLocaleDateString('en-US', { weekday: 'short', year: 'numeric', month: 'short', day: 'numeric' });
            document.getElementById('current-time').textContent = timeString;
            document.getElementById('current-date').textContent = dateString;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
