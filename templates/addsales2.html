<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Sale</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/new_sale.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-prescription-bottle-medical"></i>
                <span>Amjad Pharmacy</span>
            </div>
            <button class="close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="/dashboard2" class="link">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/medicien2" class="link">
                        <i class="fas fa-pills"></i>
                        <span>Medicine</span>
                    </a>
                </li>
                <li>
                    <a href="/users2" class="link">
                        <i class="fas fa-users"></i>
                        <span>My Profile</span>
                    </a>
                </li>
                <li>
                    <a href="/customer2" class="link">
                        <i class="fas fa-user-group"></i>
                        <span>Customers</span>
                    </a>
                </li>
                <li>
                    <a href="/orders2" class="link">
                        <i class="fas fa-clipboard-list"></i>
                        <span>Orders</span>
                    </a>
                </li>
                <li class="active">
                    <a href="/sales2" class="link">
                        <i class="fas fa-cash-register"></i>
                        <span>Sales</span>
                    </a>
                </li>
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <div class="time-display">
                <i class="fas fa-clock"></i>
                <div>
                    <p id="current-time"></p>
                    <p id="current-date"></p>
                </div>
            </div>
            <a href="/" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="page-header">
            <h1><i class="fas fa-plus-circle"></i> New Sale</h1>
            <p>Create a new sale transaction</p>
        </div>

        <div class="form-container">
            <div class="form-card">
                <div class="card-header">
                    <i class="fas fa-receipt"></i>
                    <span>Sale Details</span>
                </div>
                <form action="{{ url_for('add_orders2') }}" method="POST">
                    <div class="form-body">
                        <div class="form-group">
                            <label for="CustomerID"><i class="fas fa-user"></i> Customer ID</label>
                            <input type="number" name="CustomerID" id="CustomerID" required min="1" placeholder="Enter customer ID">
                        </div>

                        <!-- Prescription Section -->
                        <div class="section-block">
                            <div class="section-title">
                                <i class="fas fa-file-prescription"></i> Prescription (Optional)
                            </div>
                            <div class="form-group">
                                <label for="PrescriptionID">Select Existing Prescription</label>
                                <select name="PrescriptionID" id="prescription-select">
                                    <option value="">None</option>
                                    {% for prescription in prescriptions %}
                                    <option value="{{ prescription['Prescription_ID'] }}">{{ prescription['Prescription_ID'] }} - {{ prescription['Doctor_Name'] }} ({{ prescription['Date'] }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="button" class="btn-toggle" onclick="togglePrescriptionForm()">
                                <i class="fas fa-plus"></i> Add New Prescription
                            </button>

                            <div id="prescription-form" class="collapsible-section">
                                <h4><i class="fas fa-notes-medical"></i> Add New Prescription</h4>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label><i class="fas fa-user-md"></i> Doctor Name</label>
                                        <input type="text" name="DoctorName" placeholder="Enter doctor name">
                                    </div>
                                    <div class="form-group">
                                        <label><i class="fas fa-calendar"></i> Date</label>
                                        <input type="date" name="Date" value="{{ today }}">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-sticky-note"></i> Notes</label>
                                    <textarea name="Notes" placeholder="Optional notes"></textarea>
                                </div>
                                <div class="sub-section-title">Products</div>
                                <div id="prescription-products">
                                    <div class="item-row">
                                        <div class="form-group">
                                            <label>Product ID</label>
                                            <input type="number" name="PrescriptionProductID[]" min="1" placeholder="ID">
                                        </div>
                                        <div class="form-group">
                                            <label>Dosage</label>
                                            <input type="text" name="Dosage[]" placeholder="Optional">
                                        </div>
                                        <div class="form-group">
                                            <label>Taken Times</label>
                                            <input type="text" name="TakenTimes[]" placeholder="Optional">
                                        </div>
                                        <div class="form-group">
                                            <label>Duration</label>
                                            <input type="text" name="Duration[]" placeholder="Optional">
                                        </div>
                                        <div class="form-group">
                                            <label>Quantity</label>
                                            <input type="number" name="PrescriptionQuantity[]" min="1" placeholder="Qty">
                                        </div>
                                    </div>
                                </div>
                                <button type="button" class="btn-add" onclick="addPrescriptionProduct()">
                                    <i class="fas fa-plus"></i> Add Another Product
                                </button>
                            </div>
                        </div>

                        <!-- Subscription Section -->
                        <div class="section-block">
                            <div class="section-title">
                                <i class="fas fa-sync-alt"></i> Subscription (Optional)
                            </div>
                            <div class="form-group">
                                <label for="SubscriptionID">Select Existing Subscription</label>
                                <select name="SubscriptionID" id="subscription-select">
                                    <option value="">None</option>
                                    {% for subscription in subscriptions %}
                                    <option value="{{ subscription['Subscription_ID'] }}">{{ subscription['Subscription_ID'] }} - Product ID: {{ subscription['Product_ID'] }} (Customer: {{ subscription['Customer_ID'] }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="button" class="btn-toggle" onclick="toggleSubscriptionForm()">
                                <i class="fas fa-plus"></i> Add New Subscription
                            </button>

                            <div id="subscription-form" class="collapsible-section">
                                <h4><i class="fas fa-redo"></i> Add New Subscription</h4>
                                <div class="form-group">
                                    <label><i class="fas fa-pills"></i> Product ID</label>
                                    <input type="number" name="SubscriptionProductID" min="1" placeholder="Enter product ID">
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label><i class="fas fa-calendar-plus"></i> Start Date</label>
                                        <input type="date" name="StartDate" value="{{ today }}">
                                    </div>
                                    <div class="form-group">
                                        <label><i class="fas fa-calendar-minus"></i> End Date</label>
                                        <input type="date" name="EndDate">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-clock"></i> Refill Interval (Days)</label>
                                    <input type="number" name="RefillInterval" min="1" placeholder="e.g., 30">
                                </div>
                            </div>
                        </div>

                        <!-- Order Products Section -->
                        <div class="section-block">
                            <div class="section-title">
                                <i class="fas fa-shopping-cart"></i> Order Products
                            </div>
                            <div id="order-products">
                                <div class="item-row">
                                    <div class="form-group">
                                        <label>Product ID</label>
                                        <input type="number" name="ProductID[]" required min="1" placeholder="ID">
                                    </div>
                                    <div class="form-group">
                                        <label>Quantity</label>
                                        <input type="number" name="Quantity[]" required min="1" placeholder="Qty">
                                    </div>
                                </div>
                            </div>
                            <button type="button" class="btn-add" onclick="addOrderProduct()">
                                <i class="fas fa-plus"></i> Add Another Product
                            </button>
                        </div>

                        <div class="form-group">
                            <label for="PaymentMethod"><i class="fas fa-credit-card"></i> Payment Method</label>
                            <input type="text" name="PaymentMethod" required placeholder="Cash, Card, etc.">
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="/sales2" class="btn btn-cancel"><i class="fas fa-times"></i> Cancel</a>
                        <button type="submit" class="btn btn-submit"><i class="fas fa-check"></i> Complete Sale</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function togglePrescriptionForm() {
            const form = document.getElementById('prescription-form');
            form.style.display = form.style.display === 'none' || form.style.display === '' ? 'block' : 'none';
        }

        function toggleSubscriptionForm() {
            const form = document.getElementById('subscription-form');
            form.style.display = form.style.display === 'none' || form.style.display === '' ? 'block' : 'none';
        }

        function addPrescriptionProduct() {
            const productsDiv = document.getElementById('prescription-products');
            const newProductDiv = document.createElement('div');
            newProductDiv.className = 'item-row';
            newProductDiv.innerHTML = `
                <div class="form-group">
                    <label>Product ID</label>
                    <input type="number" name="PrescriptionProductID[]" min="1" placeholder="ID">
                </div>
                <div class="form-group">
                    <label>Dosage</label>
                    <input type="text" name="Dosage[]" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label>Taken Times</label>
                    <input type="text" name="TakenTimes[]" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" name="Duration[]" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="PrescriptionQuantity[]" min="1" placeholder="Qty">
                </div>
            `;
            productsDiv.appendChild(newProductDiv);
        }

        function addOrderProduct() {
            const productsDiv = document.getElementById('order-products');
            const newProductDiv = document.createElement('div');
            newProductDiv.className = 'item-row';
            newProductDiv.innerHTML = `
                <div class="form-group">
                    <label>Product ID</label>
                    <input type="number" name="ProductID[]" required min="1" placeholder="ID">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="Quantity[]" required min="1" placeholder="Qty">
                </div>
            `;
            productsDiv.appendChild(newProductDiv);
        }

        document.getElementById('subscription-select').addEventListener('change', function() {
            const subscriptionId = this.value;
            if (!subscriptionId) return;

            fetch(`/get_subscription_products/${subscriptionId}`)
                .then(response => response.json())
                .then(data => {
                    const productsDiv = document.getElementById('order-products');
                    productsDiv.innerHTML = '';
                    const newProductDiv = document.createElement('div');
                    newProductDiv.className = 'item-row';
                    newProductDiv.innerHTML = `
                        <div class="form-group">
                            <label>Product ID</label>
                            <input type="number" name="ProductID[]" value="${data.Product_ID}" required min="1">
                        </div>
                        <div class="form-group">
                            <label>Quantity</label>
                            <input type="number" name="Quantity[]" value="1" required min="1">
                        </div>
                    `;
                    productsDiv.appendChild(newProductDiv);
                });
        });

        function updateTime() {
            const now = new Date();
            document.getElementById("current-time").textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            document.getElementById("current-date").textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        const toggleBtn = document.getElementById("toggleSidebar");
        const closeBtn = document.getElementById("closeSidebar");
        const sidebar = document.getElementById("sidebar");
        toggleBtn.addEventListener("click", () => sidebar.classList.toggle("active"));
        closeBtn.addEventListener("click", () => sidebar.classList.remove("active"));
    </script>
</body>
</html>
