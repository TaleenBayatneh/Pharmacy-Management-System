<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Sale</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/new_sale.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-prescription-bottle-medical"></i>
                <span>Amjad Pharmacy</span>
            </div>
            <button class="close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="/dashboard" class="link">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/medicien" class="link">
                        <i class="fas fa-pills"></i>
                        <span>Medicine</span>
                    </a>
                </li>
                <li>
                    <a href="/users" class="link">
                        <i class="fas fa-users"></i>
                        <span>Users</span>
                    </a>
                </li>
                <li>
                    <a href="/customer" class="link">
                        <i class="fas fa-user-group"></i>
                        <span>Customers</span>
                    </a>
                </li>
                <li>
                    <a href="/orders" class="link">
                        <i class="fas fa-clipboard-list"></i>
                        <span>Orders</span>
                    </a>
                </li>
                <li class="active">
                    <a href="/sales" class="link">
                        <i class="fas fa-cash-register"></i>
                        <span>Sales</span>
                    </a>
                </li>
                <li>
                    <a href="/reports" class="link">
                        <i class="fas fa-chart-pie"></i>
                        <span>Reports</span>
                    </a>
                </li>
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <div class="time-display">
                <i class="fas fa-clock"></i>
                <div>
                    <p id="current-time"></p>
                    <p id="current-date"></p>
                </div>
            </div>
            <a href="/login" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->

    <div class="main-content">
        <div class="page-header">
            <a href="/sales" class="btn-back"><i class="fas fa-arrow-left"></i> Back</a>
            <h1><i class="fas fa-plus-circle"></i> New Sale</h1>
            <p>Create a new sale transaction</p>
        </div>

        <div class="form-container">
            <div class="form-card">
                <div class="card-header">
                    <i class="fas fa-receipt"></i>
                    <span>Sale Details</span>
                </div>
                <form action="{{ url_for('submit_sales') }}" method="POST">
                    <div class="form-body">
                        <div class="form-group">
                            <label for="CustomerID"><i class="fas fa-user"></i> Customer ID</label>
                            <input type="number" name="CustomerID" id="CustomerID" required min="1" placeholder="Enter customer ID">
                        </div>

                        <!-- Prescription Section -->
                        <div class="section-block">
                            <div class="section-title">
                                <i class="fas fa-file-prescription"></i> Prescription (Optional)
                            </div>
                            <div class="form-group">
                                <label for="PrescriptionID">Select Existing Prescription</label>
                                <select name="PrescriptionID" id="prescription-select" onchange="togglePrescriptionSection(); updateOrderProductsVisibility();">
                                    <option value="">None</option>
                                    {% for prescription in prescriptions %}
                                    <option value="{{ prescription['Prescription_ID'] }}">{{ prescription['Prescription_ID'] }} - {{ prescription['Doctor_Name'] }} ({{ prescription['Date'] }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="button" class="btn-toggle" onclick="togglePrescriptionSection(true); updateOrderProductsVisibility();">
                                <i class="fas fa-plus"></i> Add New Prescription
                            </button>

                            <div id="prescription-section" class="collapsible-section">
                                <h4><i class="fas fa-notes-medical"></i> Add New Prescription</h4>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label for="DoctorName"><i class="fas fa-user-md"></i> Doctor Name</label>
                                        <input type="text" name="DoctorName" id="DoctorName" placeholder="Enter doctor name">
                                    </div>
                                    <div class="form-group">
                                        <label for="Date"><i class="fas fa-calendar"></i> Date</label>
                                        <input type="date" name="Date" id="Date" value="{{ today }}">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label for="Notes"><i class="fas fa-sticky-note"></i> Notes</label>
                                    <textarea name="Notes" id="Notes" placeholder="Optional notes"></textarea>
                                </div>
                                <div class="sub-section-title">Products</div>
                                <div id="prescription-products">
                                    <div class="item-row">
                                        <div class="form-group">
                                            <label>Product Name</label>
                                            <select name="PrescriptionProductID[]">
                                                <option value="">Select Product</option>
                                                {% for product in products %}
                                                <option value="{{ product['Product_ID'] }}">{{ product['Name'] }} (ID: {{ product['Product_ID'] }})</option>
                                                {% endfor %}
                                            </select>
                                        </div>
                                        <div class="form-group">
                                            <label>Dosage</label>
                                            <input type="text" name="Dosage[]" placeholder="Optional">
                                        </div>
                                        <div class="form-group">
                                            <label>Taken Times</label>
                                            <input type="text" name="TakenTimes[]" placeholder="Optional">
                                        </div>
                                        <div class="form-group">
                                            <label>Duration</label>
                                            <input type="text" name="Duration[]" placeholder="Optional">
                                        </div>
                                        <div class="form-group">
                                            <label>Quantity</label>
                                            <input type="number" name="PrescriptionQuantity[]" min="1" placeholder="Qty">
                                        </div>
                                    </div>
                                </div>
                                <button type="button" class="btn-add" onclick="addPrescriptionProduct()">
                                    <i class="fas fa-plus"></i> Add Another Product
                                </button>
                            </div>
                        </div>

                        <!-- Subscription Section -->
                        <div class="section-block">
                            <div class="section-title">
                                <i class="fas fa-sync-alt"></i> Subscription (Optional)
                            </div>
                            <div class="form-group">
                                <label for="SubscriptionID">Select Existing Subscription</label>
                                <select name="SubscriptionID" id="subscription-select" onchange="toggleSubscriptionSection(); updateOrderProductsVisibility();">
                                    <option value="">None</option>
                                    {% for subscription in subscriptions %}
                                    <option value="{{ subscription['Subscription_ID'] }}">{{ subscription['Subscription_ID'] }} - Product ID: {{ subscription['Product_ID'] }} (Customer: {{ subscription['Customer_ID'] }})</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <button type="button" class="btn-toggle" onclick="toggleSubscriptionSection(true); updateOrderProductsVisibility();">
                                <i class="fas fa-plus"></i> Add New Subscription
                            </button>

                            <div id="subscription-section" class="collapsible-section">
                                <h4><i class="fas fa-redo"></i> Add New Subscription</h4>
                                <div class="form-group">
                                    <label>Product Name</label>
                                    <select name="SubscriptionProductID">
                                        <option value="">Select Product</option>
                                        {% for product in products %}
                                        <option value="{{ product['Product_ID'] }}">{{ product['Name'] }} (ID: {{ product['Product_ID'] }})</option>
                                        {% endfor %}
                                    </select>
                                </div>
                                <div class="form-row">
                                    <div class="form-group">
                                        <label><i class="fas fa-calendar-plus"></i> Start Date</label>
                                        <input type="date" name="StartDate" value="{{ today }}">
                                    </div>
                                    <div class="form-group">
                                        <label><i class="fas fa-calendar-minus"></i> End Date</label>
                                        <input type="date" name="EndDate">
                                    </div>
                                </div>
                                <div class="form-group">
                                    <label><i class="fas fa-clock"></i> Refill Interval (Days)</label>
                                    <input type="number" name="RefillInterval" min="1" placeholder="e.g., 30">
                                </div>
                            </div>
                        </div>

                        <!-- Order Products Section -->
                        <div id="order-products-section" class="section-block">
                            <div class="section-title">
                                <i class="fas fa-shopping-cart"></i> Order Products
                            </div>
                            <div id="order-products">
                                <div class="item-row">
                                    <div class="form-group">
                                        <label>Product Name</label>
                                        <select name="product_id" required>
                                            <option value="">Select Product</option>
                                            {% for product in products %}
                                            <option value="{{ product['Product_ID'] }}">{{ product['Name'] }}</option>
                                            {% endfor %}
                                        </select>
                                    </div>
                                    <div class="form-group">
                                        <label>Quantity</label>
                                        <input type="number" name="quantity" required min="1" placeholder="Qty">
                                    </div>
                                </div>
                            </div>
                            <button type="button" class="btn-add" onclick="addOrderBtn()">
                                <i class="fas fa-plus"></i> Add Another Product
                            </button>
                        </div>

                        <!-- Optional Fields -->
                        <div class="form-row">
                            <div class="form-group">
                                <label for="insurance_discount"><i class="fas fa-percent"></i> Discount (%)</label>
                                <input type="number" name="insurance_discount" step="1" min="0" value="0">
                            </div>
                            <div class="form-group">
                                <label for="payment_method"><i class="fas fa-credit-card"></i> Payment Method</label>
                                <input type="text" name="payment_method" placeholder="Cash, Card, etc.">
                            </div>
                        </div>
                    </div>

                    <div class="form-actions">
                        <a href="/sales" class="btn-cancel"><i class="fas fa-times"></i> Cancel</a>
                        <button type="submit" class="btn-submit"><i class="fas fa-check"></i> Complete Sale</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        function togglePrescriptionSection(forceAdd = false) {
            const select = document.getElementById('prescription-select');
            const section = document.getElementById('prescription-section');
            const isVisible = forceAdd || select.value !== "";

            if (isVisible) {
                section.style.display = 'block';
                document.getElementById('DoctorName').required = true;
                document.getElementById('Date').required = true;
                const productRows = document.querySelectorAll('#prescription-products .item-row');
                productRows.forEach(row => {
                    row.querySelector('select[name="PrescriptionProductID[]"]').required = true;
                    row.querySelector('input[name="PrescriptionQuantity[]"]').required = true;
                });
            } else {
                section.style.display = 'none';
                document.getElementById('DoctorName').required = false;
                document.getElementById('DoctorName').value = '';
                document.getElementById('Date').required = false;
                document.getElementById('Date').value = '{{ today }}';
                document.getElementById('Notes').value = '';
                document.getElementById('prescription-products').innerHTML = `                    <div class="item-row">
                        <div class="form-group">
                            <label>Product Name</label>
                            <select name="PrescriptionProductID[]">
                                <option value="">Select Product</option>
                                {% for product in products %}
                                <option value="{{ product['Product_ID'] }}">{{ product['Name'] }} (ID: {{ product['Product_ID'] }})</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Dosage</label>
                            <input type="text" name="Dosage[]" placeholder="Optional">
                        </div>
                        <div class="form-group">
                            <label>Taken Times</label>
                            <input type="text" name="TakenTimes[]" placeholder="Optional">
                        </div>
                        <div class="form-group">
                            <label>Duration</label>
                            <input type="text" name="Duration[]" placeholder="Optional">
                        </div>
                        <div class="form-group">
                            <label>Quantity</label>
                            <input type="number" name="PrescriptionQuantity[]" min="1" placeholder="Qty">
                        </div>
                    </div>`;
            }
        }

        function toggleSubscriptionSection(forceAdd = false) {
            const select = document.getElementById('subscription-select');
            const section = document.getElementById('subscription-section');
            const isVisible = forceAdd || select.value !== "";

            if (isVisible) {
                section.style.display = 'block';
                document.querySelector('select[name="SubscriptionProductID"]').required = true;
                document.querySelector('input[name="StartDate"]').required = true;
                document.querySelector('input[name="RefillInterval"]').required = true;
            } else {
                section.style.display = 'none';
                document.querySelector('select[name="SubscriptionProductID"]').required = false;
                document.querySelector('select[name="SubscriptionProductID"]').value = '';
                document.querySelector('input[name="StartDate"]').required = false;
                document.querySelector('input[name="StartDate"]').value = '{{ today }}';
                document.querySelector('input[name="EndDate"]').value = '';
                document.querySelector('input[name="RefillInterval"]').required = false;
                document.querySelector('input[name="RefillInterval"]').value = '';
            }
        }

        function updateOrderProductsVisibility() {
            const prescriptionSelect = document.getElementById('prescription-select');
            const subscriptionSelect = document.getElementById('subscription-select');
            const orderProductsSection = document.getElementById('order-products-section');

            if (prescriptionSelect.value !== "" || subscriptionSelect.value !== "") {
                orderProductsSection.style.display = 'none';
                const productRows = document.querySelectorAll('#order-products .item-row');
                productRows.forEach(row => {
                    row.querySelector('select[name="product_id"]').required = false;
                    row.querySelector('input[name="quantity"]').required = false;
                });
            } else {
                orderProductsSection.style.display = 'block';
                const productRows = document.querySelectorAll('#order-products .item-row');
                productRows.forEach(row => {
                    row.querySelector('select[name="product_id"]').required = false;
                    row.querySelector('input[name="quantity"]').required = false;
                });
            }
        }

        function addPrescriptionProduct() {
            const productsDiv = document.getElementById('prescription-products');
            const newProductDiv = document.createElement('div');
            newProductDiv.className = 'item-row';
            newProductDiv.innerHTML = `                <div class="form-group">
                    <label>Product Name</label>
                    <select name="PrescriptionProductID[]" required>
                        <option value="">Select Product</option>
                        {% for product in products %}
                        <option value="{{ product['Product_ID'] }}">{{ product['Name'] }} (ID: {{ product['Product_ID'] }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Dosage</label>
                    <input type="text" name="Dosage[]" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label>Taken Times</label>
                    <input type="text" name="TakenTimes[]" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label>Duration</label>
                    <input type="text" name="Duration[]" placeholder="Optional">
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="PrescriptionQuantity[]" min="1" required placeholder="Qty">
                </div>`;
            productsDiv.appendChild(newProductDiv);
        }

        function addOrderBtn() {
            const productsDiv = document.getElementById('order-products');
            const newProductDiv = document.createElement('div');
            newProductDiv.className = 'item-row';
            newProductDiv.innerHTML = `                <div class="form-group">
                    <label>Product Name</label>
                    <select name="product_id" required>
                        <option value="">Select Product</option>
                        {% for product in products %}
                        <option value="{{ product['Product_ID'] }}">{{ product['Name'] }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label>Quantity</label>
                    <input type="number" name="quantity" required min="1" placeholder="Qty">
                </div>`;
            productsDiv.appendChild(newProductDiv);
        }

        document.addEventListener('DOMContentLoaded', () => {
            togglePrescriptionSection();
            toggleSubscriptionSection();
            updateOrderProductsVisibility();
        });

        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('current-time').textContent = timeString;
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
