<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports - Amjad Pharmacy</title>
    <link rel="stylesheet" href="/static/css/report.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-prescription-bottle-medical"></i>
                <span>Amjad Pharmacy</span>
            </div>
            <button class="close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="/dashboard" class="link">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/medicien" class="link">
                        <i class="fas fa-pills"></i>
                        <span>Medicine</span>
                    </a>
                </li>
                <li>
                    <a href="/users" class="link">
                        <i class="fas fa-users"></i>
                        <span>Users</span>
                    </a>
                </li>
                <li>
                    <a href="/customer" class="link">
                        <i class="fas fa-user-group"></i>
                        <span>Customers</span>
                    </a>
                </li>
                <li>
                    <a href="/orders" class="link">
                        <i class="fas fa-clipboard-list"></i>
                        <span>Orders</span>
                    </a>
                </li>
                <li>
                    <a href="/sales" class="link">
                        <i class="fas fa-cash-register"></i>
                        <span>Sales</span>
                    </a>
                </li>
                <li class="active">
                    <a href="/reports" class="link">
                        <i class="fas fa-chart-pie"></i>
                        <span>Reports</span>
                    </a>
                </li>
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <div class="time-display">
                <i class="fas fa-clock"></i>
                <div>
                    <p id="current-time"></p>
                    <p id="current-date"></p>
                </div>
            </div>
            <a href="/" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <header class="top-header">
            <button class="toggle-sidebar" id="toggleSidebar"><i class="fas fa-bars"></i></button>
            <div class="header-title">
                <h1><i class="fas fa-chart-pie"></i> Reports</h1>
                <p>Generate and view various pharmacy reports</p>
            </div>
        </header>

        <div class="reports-container">
            <div class="report-selector-card">
                <div class="card-icon"><i class="fas fa-file-alt"></i></div>
                <h2>Select a Report</h2>
                <p>Choose from available reports to view detailed analytics</p>
                
                <div class="select-wrapper">
                    <i class="fas fa-chevron-down"></i>
                    <select id="reports" name="reports">
                        <option value="">-- Choose a Report --</option>
                        <option value="/report1">Top 5 Most Sold Products</option>
                        <option value="/report2">Total Sales Revenue per Pharmacist</option>
                        <option value="/report3">Top 5 Customers by Amount Spent</option>
                        <option value="/report4">Products Expiring in 30 Days</option>
                        <option value="/report5">Quantity Sold per Product Type</option>
                        <option value="/report6">Avg & Max Wages by Role</option>
                        <option value="/report7">Most Purchased Product</option>
                        <option value="/report8">Orders by Pharmacist</option>
                        <option value="/report9">Top Customers (Prescriptions)</option>
                        <option value="/report10">Low Stock Products</option>
                        <option value="/report11">Top Payment Method</option>
                        <option value="/report12">Products with No Sales</option>
                    </select>
                </div>
            </div>
            
            <div class="quick-reports">
                <div class="quick-card" onclick="window.location.href='/report1'"><i class="fas fa-trophy"></i><span>Top Products</span></div>
                <div class="quick-card" onclick="window.location.href='/report2'"><i class="fas fa-user-tie"></i><span>Pharmacist Sales</span></div>
                <div class="quick-card" onclick="window.location.href='/report3'"><i class="fas fa-star"></i><span>Top Customers</span></div>
                <div class="quick-card" onclick="window.location.href='/report10'"><i class="fas fa-exclamation-triangle"></i><span>Low Stock</span></div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('reports').addEventListener('change', function () {
            if (this.value) window.location.href = this.value;
        });

        function updateTime() {
            const now = new Date();
            document.getElementById("current-time").textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            document.getElementById("current-date").textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        const toggleBtn = document.getElementById("toggleSidebar");
        const closeBtn = document.getElementById("closeSidebar");
        const sidebar = document.getElementById("sidebar");
        toggleBtn.addEventListener("click", () => sidebar.classList.toggle("active"));
        closeBtn.addEventListener("click", () => sidebar.classList.remove("active"));
    </script>
</body>
</html>
