<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pharmacy Management - Home</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/dashboard_style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .action-card {
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            padding: 50px;
            text-align: center;
            max-width: 600px;
            width: 100%;
            animation: fadeIn 0.5s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .action-card h1 {
            font-size: 28px;
            color: #3d5a4c;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .action-card p {
            color: #8a9a92;
            margin-bottom: 35px;
        }

        .action-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
        }

        .action-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 16px 25px;
            background: linear-gradient(135deg, #6aab8c 0%, #5a9e7a 100%);
            color: white;
            text-decoration: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s ease;
        }

        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(106, 171, 140, 0.35);
        }

        .action-btn i {
            font-size: 18px;
        }

        @media (max-width: 768px) {
            .action-buttons {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <div class="logo">
                <i class="fas fa-prescription-bottle-medical"></i>
                <span>Amjad Pharmacy</span>
            </div>
            <button class="close-sidebar" id="closeSidebar">
                <i class="fas fa-times"></i>
            </button>
        </div>
        
        <nav class="sidebar-nav">
            <ul>
                <li>
                    <a href="/dashboard2" class="link">
                        <i class="fas fa-home"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="/medicien2" class="link">
                        <i class="fas fa-pills"></i>
                        <span>Medicine</span>
                    </a>
                </li>
                <li>
                    <a href="/users2" class="link">
                        <i class="fas fa-users"></i>
                        <span>My Profile</span>
                    </a>
                </li>
                <li>
                    <a href="/customer2" class="link">
                        <i class="fas fa-user-group"></i>
                        <span>Customers</span>
                    </a>
                </li>
                <li>
                    <a href="/orders2" class="link">
                        <i class="fas fa-clipboard-list"></i>
                        <span>Orders</span>
                    </a>
                </li>
                <li class="active">
                    <a href="/sales2" class="link">
                        <i class="fas fa-cash-register"></i>
                        <span>Sales</span>
                    </a>
                </li>
            </ul>
        </nav>
        
        <div class="sidebar-footer">
            <div class="time-display">
                <i class="fas fa-clock"></i>
                <div>
                    <p id="current-time"></p>
                    <p id="current-date"></p>
                </div>
            </div>
            <a href="/" class="logout-btn">
                <i class="fas fa-sign-out-alt"></i>
                <span>Logout</span>
            </a>
        </div>
    </div>


    <!-- Main Content -->
    <div class="main-content">
        <div class="action-card">
            <h1><i class="fas fa-question-circle" style="color: #6aab8c; margin-right: 10px;"></i>What Do You Want To Do?</h1>
            <p>Please choose one of the options below</p>
            <div class="action-buttons">
                <a href="{{ url_for('new_sale2') }}" class="action-btn">
                    <i class="fas fa-plus-circle"></i> Make New Sale
                </a>
                <a href="{{ url_for('sale_archive2') }}" class="action-btn">
                    <i class="fas fa-archive"></i> Go To Archive
                </a>
                <a href="{{ url_for('manage_prescriptions2') }}" class="action-btn">
                    <i class="fas fa-file-prescription"></i> Prescriptions
                </a>
                <a href="{{ url_for('subscriptions2') }}" class="action-btn">
                    <i class="fas fa-sync-alt"></i> Subscriptions
                </a>
            </div>
        </div>
    </div>

    <script>
        function updateTime() {
            const now = new Date();
            document.getElementById("current-time").textContent = now.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit', hour12: true });
            document.getElementById("current-date").textContent = now.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric' });
        }
        setInterval(updateTime, 1000);
        updateTime();

        const toggleBtn = document.getElementById("toggleSidebar");
        const closeBtn = document.getElementById("closeSidebar");
        const sidebar = document.getElementById("sidebar");
        if (toggleBtn) toggleBtn.addEventListener("click", () => sidebar.classList.toggle("active"));
        if (closeBtn) closeBtn.addEventListener("click", () => sidebar.classList.remove("active"));
    </script>
</body>
</html>
